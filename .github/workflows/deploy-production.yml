name: Deploy - Production (Main)

on:
  push:
    branches: [main]
    paths:
      - "api-gateway/**"
      - "user-service/**"
      - "question-service/**"
      - "collab-service/**"
      - "matching-service/**"
      - "frontend/**"
      - "Dockerfile*"
      - "docker-compose.yml"
      - ".github/workflows/deploy-production.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          [
            api-gateway,
            user-service,
            question-service,
            collab-service,
            matching-service,
            frontend,
          ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=tag

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push-production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes
        id: changelog
        run: |
          # Get commits since last release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"%h - %s" | head -20)
          else
            CHANGELOG=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"%h - %s")
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Production Release - $(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Recent Changes" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Deployment Instructions" >> $GITHUB_OUTPUT
          echo "- Pull latest images from: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-<service>:latest\`" >> $GITHUB_OUTPUT
          echo "- Review the [CI/CD Documentation](./CICD.md) for deployment details" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}-${{ github.sha }}
          release_name: Production Release ${{ github.run_number }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  notify-production:
    runs-on: ubuntu-latest
    needs: [build-and-push-production, create-release]
    if: success()

    steps:
      - name: Notify deployment success
        run: |
          echo "✅ Production deployment successful!"
          echo "📦 Images pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-<service>:latest"
          echo "🔗 View images: https://github.com/users/${{ github.actor }}/packages"

      - name: Print deployment info
        run: |
          echo "════════════════════════════════════════"
          echo "🚀 PRODUCTION DEPLOYMENT COMPLETE"
          echo "════════════════════════════════════════"
          echo "Branch: main"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Repository: ${{ env.IMAGE_NAME }}"
          echo "Services: api-gateway, user-service, question-service, collab-service, matching-service, frontend"
          echo "Tags: latest + commit SHA"
          echo "════════════════════════════════════════"
